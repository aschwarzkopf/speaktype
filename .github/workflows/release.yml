name: Release

# Trigger on every tag push of the form v1.2.3. Push the tag and the
# workflow handles the rest: build → sign with Sparkle EdDSA →
# generate appcast entry → upload ZIP to GitHub Releases →
# commit appcast back to main so GitHub Pages serves it.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release + push appcast.xml

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for git history & tag message

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache Swift Package dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('speaktype.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Sparkle's <sparkle:version> must equal the running app's
          # CFBundleVersion (build number) — pull it from project.pbxproj.
          BUILD=$(grep -m1 'CURRENT_PROJECT_VERSION = ' speaktype.xcodeproj/project.pbxproj \
                    | sed -E 's/.*CURRENT_PROJECT_VERSION = ([0-9]+).*/\1/')
          if [[ -z "$BUILD" ]]; then
            echo "❌ Could not extract CURRENT_PROJECT_VERSION from project.pbxproj" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Building SpeakType $VERSION (build $BUILD)"

      - name: Import signing certificate
        env:
          SIGNING_CERT_P12: ${{ secrets.SIGNING_CERT_P12 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          # Why this exists: TCC keys Accessibility / Microphone grants by
          # the app's code signing identity. If CI ad-hoc-signs but the user
          # originally installed a build signed with "SpeakType Dev", every
          # auto-update would silently revoke their grants. Importing the
          # same self-signed cert here keeps the signature stable across
          # local builds and CI builds, so TCC permissions persist.
          if [[ -z "$SIGNING_CERT_P12" || -z "$SIGNING_CERT_PASSWORD" ]]; then
            echo "❌ SIGNING_CERT_P12 / SIGNING_CERT_PASSWORD secrets not set." >&2
            exit 1
          fi

          # Decode the base64 .p12 to a temp file.
          CERT_PATH="$RUNNER_TEMP/signing-cert.p12"
          echo "$SIGNING_CERT_P12" | base64 --decode > "$CERT_PATH"

          # Create a dedicated, ephemeral keychain — never pollute the
          # runner's default login keychain. We tear it down after build.
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to the search list so codesign can find the identity.
          security list-keychains -d user -s \
            "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          security import "$CERT_PATH" \
            -P "$SIGNING_CERT_PASSWORD" \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Suppress the keychain access dialog when codesign uses the key.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          rm -f "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          # Verify the identity is now visible to codesign.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build (Release, signed with SpeakType Dev)
        run: |
          # CODE_SIGN_IDENTITY="SpeakType Dev" — same self-signed cert the
          # developer uses locally, so CI builds and local builds share a
          # signature and TCC grants survive auto-updates.
          xcodebuild \
            -project speaktype.xcodeproj \
            -scheme speaktype \
            -configuration Release \
            -derivedDataPath build \
            MARKETING_VERSION=${{ steps.version.outputs.version }} \
            CODE_SIGN_IDENTITY="SpeakType Dev" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            ENABLE_HARDENED_RUNTIME=NO \
            build \
            | xcpretty --simple --no-utf || (echo "::warning::xcpretty not available — raw log follows"; xcodebuild -project speaktype.xcodeproj -scheme speaktype -configuration Release -derivedDataPath build MARKETING_VERSION=${{ steps.version.outputs.version }} CODE_SIGN_IDENTITY="SpeakType Dev" CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM="" OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" ENABLE_HARDENED_RUNTIME=NO build)

          # Sanity check: confirm the signature, fail loudly if it didn't
          # come out as "SpeakType Dev" (e.g. fell back to ad-hoc).
          AUTHORITY=$(codesign -dvv "build/Build/Products/Release/speaktype.app" 2>&1 | grep -E "^Authority=" | head -1)
          echo "Signature: $AUTHORITY"
          if [[ "$AUTHORITY" != "Authority=SpeakType Dev" ]]; then
            echo "❌ Build is not signed with SpeakType Dev — got: $AUTHORITY" >&2
            exit 1
          fi

      - name: Package as ZIP
        id: package
        run: |
          APP="build/Build/Products/Release/speaktype.app"
          if [[ ! -d "$APP" ]]; then
            echo "❌ Build output missing: $APP" >&2
            find build/Build/Products -name "*.app" -type d
            exit 1
          fi
          ZIP="SpeakType-${{ steps.version.outputs.version }}.zip"
          # `ditto -c -k --sequesterRsrc --keepParent` is the canonical
          # macOS-aware zip — preserves resource forks and bundle structure
          # in a way `zip` won't. Sparkle expects this exact format.
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"
          SIZE=$(stat -f %z "$ZIP")
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "Packaged $ZIP — $SIZE bytes"

      - name: Download Sparkle CLI tools
        run: |
          # Sparkle's own GitHub release is properly signed/notarized,
          # unlike the Homebrew cask which has been deprecated for
          # failing Gatekeeper. Download direct to avoid CI-runner
          # quarantine headaches.
          SPARKLE_VERSION=2.6.4
          curl -fsSL -o /tmp/Sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p /tmp/sparkle
          tar -xf /tmp/Sparkle.tar.xz -C /tmp/sparkle
          ls /tmp/sparkle/bin/
          echo "/tmp/sparkle/bin" >> "$GITHUB_PATH"

      - name: Sign update with EdDSA
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [[ -z "$SPARKLE_PRIVATE_KEY" ]]; then
            echo "❌ SPARKLE_PRIVATE_KEY secret is not set." >&2
            echo "Run: gh secret set SPARKLE_PRIVATE_KEY" >&2
            exit 1
          fi
          KEY_FILE=$(mktemp)
          # Strip any accidental trailing whitespace / newlines that the
          # GitHub UI tends to add when pasting a secret.
          printf '%s' "$SPARKLE_PRIVATE_KEY" | tr -d '\n' > "$KEY_FILE"

          SIG_OUTPUT=$(/tmp/sparkle/bin/sign_update -f "$KEY_FILE" "${{ steps.package.outputs.zip }}")
          rm "$KEY_FILE"

          # sign_update prints to stdout; capture verbatim for the
          # appcast generator. Format:
          #   sparkle:edSignature="..." length="..."
          echo "Signature output: $SIG_OUTPUT"
          # Base64-encode through GITHUB_OUTPUT to avoid quoting issues.
          {
            echo 'sign_output<<SIGEOF'
            echo "$SIG_OUTPUT"
            echo 'SIGEOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update appcast.xml
        run: |
          ./scripts/update-appcast.sh \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.version.outputs.build }}" \
            "${{ steps.package.outputs.zip }}" \
            "${{ steps.package.outputs.size }}" \
            '${{ steps.sign.outputs.sign_output }}'
          echo "--- appcast.xml head ---"
          head -30 docs/appcast.xml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Commit appcast.xml back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          if git diff --cached --quiet; then
            echo "No appcast changes to commit (already up to date?)"
          else
            git commit -m "release: appcast for v${{ steps.version.outputs.version }}"
            git push origin HEAD:main
          fi
